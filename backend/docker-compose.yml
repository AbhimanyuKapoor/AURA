services:
  postgres:
    image: postgres:15
    container_name: aura-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aura
      POSTGRES_USER: aura_user
      POSTGRES_PASSWORD: aura_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
