services:
  postgres:
    image: postgres:15
    container_name: aura-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aura
      POSTGRES_USER: aura_user
      POSTGRES_PASSWORD: aura_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aura_user -d aura"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: aura-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: aura
      DB_USERNAME: aura_user
      DB_PASSWORD: aura_pass

volumes:
  pgdata: