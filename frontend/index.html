<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aura</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@1,300;1,400;1,500&family=Geist+Mono:wght@300;400;500&family=Geist:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0b0d11;
        --bg2: #0f1117;
        --surface: #13161d;
        --border: rgba(255, 255, 255, 0.07);
        --border-hi: rgba(255, 255, 255, 0.13);
        --text: #f0f2f7;
        --text-2: #8b90a0;
        --text-3: #4a4f5e;
        --accent: #4f8ef7;
        --accent-dim: rgba(79, 142, 247, 0.12);
        --ok: #3ecf8e;
        --err: #f76f6f;
        --radius-sm: 6px;
        --radius: 10px;
        --radius-lg: 16px;
        --mono: "Geist Mono", monospace;
        --display: "Cormorant", Georgia, serif;
        --sans: "Geist", system-ui, sans-serif;
      }

      html,
      body {
        height: 100%;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--sans);
        font-weight: 400;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .wrapper {
        width: 100%;
        max-width: 1080px;
        padding: 0 52px 80px;
        animation: fadein 0.4s ease both;
      }

      /* HEADER */
      header {
        padding: 48px 0 40px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--border);
        margin-bottom: 36px;
      }
      .brand {
        display: flex;
        align-items: baseline;
        gap: 14px;
      }
      .brand-name {
        font-family: var(--display);
        font-size: 2.6rem;
        font-weight: 300;
        font-style: italic;
        color: var(--text);
        letter-spacing: 0.06em;
        line-height: 1;
      }
      .brand-version {
        font-family: var(--mono);
        font-size: 0.6rem;
        color: var(--text-3);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        padding: 3px 8px;
        border: 1px solid var(--border);
        border-radius: 100px;
      }

      /* Status pill — reflects real backend state */
      .status-pill {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: var(--mono);
        font-size: 0.65rem;
        color: var(--text-2);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 6px 14px;
        border: 1px solid var(--border);
        border-radius: 100px;
        transition: border-color 0.4s;
      }
      .status-pill.connected {
        border-color: rgba(62, 207, 142, 0.3);
      }
      .status-pill.disconnected {
        border-color: rgba(247, 111, 111, 0.25);
      }

      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        flex-shrink: 0;
        transition:
          background 0.4s,
          box-shadow 0.4s;
      }
      .status-dot.connected {
        background: var(--ok);
        box-shadow: 0 0 6px var(--ok);
        animation: blink 3s ease-in-out infinite;
      }
      .status-dot.disconnected {
        background: var(--err);
        box-shadow: none;
      }

      /* GRID */
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .span-2 {
        grid-column: 1 / -1;
      }

      /* CARD */
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 32px 36px;
        transition: border-color 0.2s;
      }
      .card:hover {
        border-color: var(--border-hi);
      }
      .card-eyebrow {
        font-family: var(--mono);
        font-size: 0.6rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--text-3);
        margin-bottom: 5px;
      }
      .card-heading {
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 24px;
        letter-spacing: -0.2px;
      }

      /* RECOGNIZE */
      .recognize-inner {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 36px;
      }
      .rec-left,
      .rec-right {
        display: flex;
        flex-direction: column;
        gap: 18px;
      }
      .rec-right {
        border-left: 1px solid var(--border);
        padding-left: 36px;
      }

      .mic-display {
        display: flex;
        align-items: center;
        gap: 18px;
        padding: 8px 0;
      }
      .mic-ring {
        flex-shrink: 0;
        width: 68px;
        height: 68px;
        border-radius: 50%;
        border: 1px solid var(--border-hi);
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg2);
        transition: border-color 0.3s;
      }
      .mic-ring.active {
        border-color: var(--accent);
        box-shadow: 0 0 0 5px var(--accent-dim);
        animation: ring-breathe 2s ease-in-out infinite;
      }
      .mic-ring svg {
        width: 20px;
        height: 20px;
        stroke: var(--text-2);
        transition: stroke 0.3s;
      }
      .mic-ring.active svg {
        stroke: var(--accent);
      }

      .waveform {
        display: flex;
        align-items: center;
        gap: 3px;
        height: 32px;
      }
      .wv-bar {
        width: 3px;
        border-radius: 2px;
        background: var(--border-hi);
        height: 5px;
        transition: background 0.3s;
      }
      .waveform.active .wv-bar {
        background: var(--accent);
        animation: wv 0.7s ease-in-out infinite alternate;
      }
      .wv-bar:nth-child(1) {
        animation-delay: 0s;
      }
      .wv-bar:nth-child(2) {
        animation-delay: 0.07s;
      }
      .wv-bar:nth-child(3) {
        animation-delay: 0.14s;
      }
      .wv-bar:nth-child(4) {
        animation-delay: 0.05s;
      }
      .wv-bar:nth-child(5) {
        animation-delay: 0.12s;
      }
      .wv-bar:nth-child(6) {
        animation-delay: 0.18s;
      }
      .wv-bar:nth-child(7) {
        animation-delay: 0.09s;
      }
      .wv-bar:nth-child(8) {
        animation-delay: 0.16s;
      }

      .result-panel {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 13px 16px;
        display: flex;
        align-items: flex-start;
        gap: 10px;
        min-height: 52px;
        transition: border-color 0.3s;
      }
      .result-panel.ok {
        border-color: rgba(62, 207, 142, 0.3);
      }
      .result-panel.err {
        border-color: rgba(247, 111, 111, 0.3);
      }
      .result-indicator {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--text-3);
        margin-top: 4px;
        flex-shrink: 0;
        transition: background 0.3s;
      }
      .result-panel.ok .result-indicator {
        background: var(--ok);
        box-shadow: 0 0 6px var(--ok);
      }
      .result-panel.err .result-indicator {
        background: var(--err);
      }
      .result-text {
        font-family: var(--mono);
        font-size: 0.73rem;
        color: var(--text-2);
        line-height: 1.6;
      }
      .result-panel.ok .result-text {
        color: var(--text);
      }
      .result-panel.err .result-text {
        color: var(--err);
      }

      /* BUTTONS */
      .btn-row {
        display: flex;
        gap: 8px;
      }
      .btn {
        font-family: var(--sans);
        font-size: 0.78rem;
        font-weight: 500;
        border: none;
        cursor: pointer;
        border-radius: var(--radius-sm);
        padding: 9px 20px;
        letter-spacing: 0.01em;
        transition:
          opacity 0.15s,
          transform 0.1s;
        outline: none;
      }
      .btn:active:not(:disabled) {
        transform: scale(0.97);
      }
      .btn-primary {
        background: var(--accent);
        color: #fff;
      }
      .btn-primary:hover:not(:disabled) {
        opacity: 0.85;
      }
      .btn-secondary {
        background: transparent;
        color: var(--text-2);
        border: 1px solid var(--border-hi);
      }
      .btn-secondary:hover:not(:disabled) {
        color: var(--text);
        border-color: rgba(255, 255, 255, 0.22);
      }
      .btn:disabled {
        opacity: 0.25;
        cursor: not-allowed;
      }

      /* UPLOAD */
      .field {
        display: flex;
        flex-direction: column;
        gap: 5px;
        margin-bottom: 14px;
      }
      .field label {
        font-family: var(--mono);
        font-size: 0.6rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--text-3);
      }
      .field input[type="text"] {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 9px 13px;
        color: var(--text);
        font-family: var(--mono);
        font-size: 0.78rem;
        outline: none;
        transition: border-color 0.18s;
        width: 100%;
      }
      .field input[type="text"]:focus {
        border-color: var(--accent);
      }
      .field input[type="text"]::placeholder {
        color: var(--text-3);
      }

      .drop-zone {
        position: relative;
        border: 1px dashed var(--border-hi);
        border-radius: var(--radius);
        padding: 22px;
        text-align: center;
        cursor: pointer;
        transition:
          border-color 0.2s,
          background 0.2s;
        background: var(--bg);
        margin-bottom: 16px;
      }
      .drop-zone:hover,
      .drop-zone.drag-over {
        border-color: var(--accent);
        background: var(--accent-dim);
      }
      .drop-zone input[type="file"] {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
        width: 100%;
        height: 100%;
      }
      .drop-icon {
        font-size: 1.1rem;
        margin-bottom: 5px;
        opacity: 0.35;
      }
      .drop-text {
        font-family: var(--mono);
        font-size: 0.67rem;
        color: var(--text-3);
        line-height: 1.7;
      }
      .drop-text strong {
        color: var(--text-2);
        font-weight: 400;
      }
      #fileName {
        font-family: var(--mono);
        font-size: 0.67rem;
        color: var(--accent);
        margin-top: 4px;
      }
      #uploadStatus {
        font-family: var(--mono);
        font-size: 0.7rem;
        margin-top: 10px;
        min-height: 16px;
      }
      #uploadStatus.ok {
        color: var(--ok);
      }
      #uploadStatus.err {
        color: var(--err);
      }

      /* PLACEHOLDER */
      .placeholder {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        min-height: 156px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        position: relative;
        overflow: hidden;
      }
      .placeholder::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(var(--border) 1px, transparent 1px),
          linear-gradient(90deg, var(--border) 1px, transparent 1px);
        background-size: 28px 28px;
      }
      .ph-badge {
        position: relative;
        font-family: var(--mono);
        font-size: 0.58rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--text-3);
        border: 1px solid var(--border-hi);
        padding: 4px 12px;
        border-radius: 100px;
      }
      .ph-label {
        position: relative;
        font-size: 0.8rem;
        color: var(--text-3);
      }
      .log-rows {
        position: absolute;
        inset: 0;
        padding: 14px 18px;
        display: flex;
        flex-direction: column;
        gap: 9px;
      }
      .log-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .log-ts {
        width: 48px;
        height: 6px;
        background: var(--border);
        border-radius: 3px;
        flex-shrink: 0;
      }
      .log-ln {
        height: 6px;
        background: var(--border);
        border-radius: 3px;
      }

      /* ANIMATIONS */
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }
      @keyframes ring-breathe {
        0%,
        100% {
          box-shadow: 0 0 0 5px var(--accent-dim);
        }
        50% {
          box-shadow:
            0 0 0 10px var(--accent-dim),
            0 0 0 16px rgba(79, 142, 247, 0.05);
        }
      }
      @keyframes wv {
        0% {
          height: 4px;
        }
        100% {
          height: 26px;
        }
      }
      @keyframes fadein {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }

      @media (max-width: 720px) {
        .wrapper {
          padding: 0 20px 60px;
        }
        .grid {
          grid-template-columns: 1fr;
        }
        .span-2 {
          grid-column: auto;
        }
        .recognize-inner {
          grid-template-columns: 1fr;
        }
        .rec-right {
          border-left: none;
          border-top: 1px solid var(--border);
          padding-left: 0;
          padding-top: 22px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <header>
        <div class="brand">
          <div class="brand-name">Aura</div>
          <div class="brand-version">v1.0</div>
        </div>
        <div class="status-pill disconnected" id="statusPill">
          <span class="status-dot disconnected" id="statusDot"></span>
          <span id="statusLabel">Disconnected</span>
        </div>
      </header>

      <div class="grid">
        <!-- RECOGNIZE -->
        <div class="card span-2">
          <div class="card-eyebrow">Microphone</div>
          <div class="card-heading">Recognize a Song</div>
          <div class="recognize-inner">
            <div class="rec-left">
              <div class="mic-display">
                <div class="mic-ring" id="ring">
                  <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke-width="1.6"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <rect x="9" y="2" width="6" height="11" rx="3" />
                    <path d="M5 10a7 7 0 0 0 14 0" />
                    <line x1="12" y1="19" x2="12" y2="22" />
                    <line x1="8" y1="22" x2="16" y2="22" />
                  </svg>
                </div>
                <div class="waveform" id="waveform">
                  <div class="wv-bar"></div>
                  <div class="wv-bar"></div>
                  <div class="wv-bar"></div>
                  <div class="wv-bar"></div>
                  <div class="wv-bar"></div>
                  <div class="wv-bar"></div>
                  <div class="wv-bar"></div>
                  <div class="wv-bar"></div>
                </div>
              </div>
              <div class="btn-row">
                <button class="btn btn-primary" id="start">
                  Start Listening
                </button>
                <button class="btn btn-secondary" id="stop" disabled>
                  Stop
                </button>
              </div>
              <div class="result-panel" id="resultBox">
                <div class="result-indicator"></div>
                <div class="result-text" id="result">
                  Idle — press Start Listening to begin
                </div>
              </div>
            </div>

            <div class="rec-right">
              <div class="card-eyebrow" style="margin-bottom: 10px">
                Live Output
              </div>
              <div class="placeholder" style="min-height: 144px">
                <div class="ph-badge">Coming Soon</div>
                <div class="ph-label">Spectrogram</div>
              </div>
            </div>
          </div>
        </div>

        <!-- UPLOAD -->
        <div class="card">
          <div class="card-eyebrow">Ingestion</div>
          <div class="card-heading">Add to Database</div>
          <div class="field">
            <label>Song Title <span style="color: var(--err)">*</span></label>
            <input
              type="text"
              id="songTitle"
              placeholder="e.g. Bohemian Rhapsody"
            />
          </div>
          <div class="field">
            <label>Artist</label>
            <input type="text" id="songArtist" placeholder="e.g. Queen" />
          </div>
          <div class="field">
            <label>Audio File <span style="color: var(--err)">*</span></label>
          </div>
          <div class="drop-zone" id="dropZone">
            <input type="file" id="songFile" accept="audio/*" />
            <div class="drop-icon">♪</div>
            <div class="drop-text">
              <strong>Choose file</strong> or drag &amp; drop
            </div>
            <div id="fileName"></div>
          </div>
          <button class="btn btn-primary" onclick="uploadSong()">
            Upload Song
          </button>
          <div id="uploadStatus"></div>
        </div>

        <!-- LOGS -->
        <div class="card">
          <div class="card-eyebrow">Pipeline</div>
          <div class="card-heading">Processing Logs</div>
          <div class="placeholder">
            <div class="log-rows">
              <div class="log-row">
                <div class="log-ts"></div>
                <div class="log-ln" style="width: 60%"></div>
              </div>
              <div class="log-row">
                <div class="log-ts"></div>
                <div class="log-ln" style="width: 78%"></div>
              </div>
              <div class="log-row">
                <div class="log-ts"></div>
                <div class="log-ln" style="width: 46%"></div>
              </div>
              <div class="log-row">
                <div class="log-ts"></div>
                <div class="log-ln" style="width: 68%"></div>
              </div>
              <div class="log-row">
                <div class="log-ts"></div>
                <div class="log-ln" style="width: 36%"></div>
              </div>
            </div>
            <div class="ph-badge">Coming Soon</div>
            <div class="ph-label">Hash &amp; Log Stream</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const startBtn = document.getElementById("start");
      const stopBtn = document.getElementById("stop");
      const resultEl = document.getElementById("result");
      const resultBox = document.getElementById("resultBox");
      const ring = document.getElementById("ring");
      const waveform = document.getElementById("waveform");
      const fileInput = document.getElementById("songFile");
      const fileNameEl = document.getElementById("fileName");
      const dropZone = document.getElementById("dropZone");
      const statusDot = document.getElementById("statusDot");
      const statusPill = document.getElementById("statusPill");
      const statusLabel = document.getElementById("statusLabel");
      let ws, recorder, stream;

      /* ── Backend connectivity ── */
      function setConnected(on) {
        const s = on ? "connected" : "disconnected";
        statusDot.className = "status-dot " + s;
        statusPill.className = "status-pill " + s;
        statusLabel.textContent = on ? "Connected" : "Disconnected";
      }

      async function checkHealth() {
        try {
          const res = await fetch("http://localhost:8080/health");
          setConnected(res.ok);
        } catch {
          setConnected(false);
        }
      }

      checkHealth();
      setInterval(checkHealth, 5000);

      /* ── File pick ── */
      fileInput.addEventListener("change", () => {
        fileNameEl.textContent = fileInput.files[0]?.name ?? "";
      });
      dropZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropZone.classList.add("drag-over");
      });
      ["dragleave", "drop"].forEach((ev) =>
        dropZone.addEventListener(ev, () =>
          dropZone.classList.remove("drag-over"),
        ),
      );

      /* ── Listen state ── */
      function setListening(on) {
        ring.classList.toggle("active", on);
        waveform.classList.toggle("active", on);
        startBtn.disabled = on;
        stopBtn.disabled = !on;
      }

      function setResult(msg, state = "") {
        resultEl.textContent = msg;
        resultBox.className = "result-panel" + (state ? " " + state : "");
      }

      /* ── WebSocket ── */
      startBtn.onclick = async () => {
        try {
          stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        } catch {
          alert("Microphone permission denied");
          return;
        }

        ws = new WebSocket("ws://localhost:8080/ws/audio");
        ws.onopen = () => {
          setConnected(true);
          recorder = new MediaRecorder(stream);
          recorder.ondataavailable = (e) => {
            if (e.data.size > 0 && ws.readyState === WebSocket.OPEN)
              ws.send(e.data);
          };
          recorder.start(1000);
          setListening(true);
          setResult("Listening…");
        };
        ws.onmessage = (e) => {
          const d = JSON.parse(e.data);
          if (d.error) setResult("Error: " + d.error, "err");
          else if (d.found)
            setResult(`${d.title} — ${d.artist}  ·  score ${d.score}`, "ok");
          else setResult("No match found.");
          ws.close();
        };
        ws.onclose = () => {
          setListening(false);
          checkHealth();
        };
        ws.onerror = () => {
          setResult("Connection error", "err");
          setListening(false);
          setConnected(false);
        };
      };

      stopBtn.onclick = () => {
        recorder?.stop();
        stream?.getTracks().forEach((t) => t.stop());
        if (ws?.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: "end" }));
          setResult("Recognizing…");
        }
      };

      /* ── Upload ── */
      async function uploadSong() {
        const title = document.getElementById("songTitle").value.trim();
        const st = document.getElementById("uploadStatus");
        st.textContent = "";
        st.className = "";

        if (!fileInput.files.length) {
          st.textContent = "Please select an audio file.";
          st.className = "err";
          return;
        }
        if (!title) {
          st.textContent = "Song title is required.";
          st.className = "err";
          return;
        }

        st.textContent = "Uploading…";
        const fd = new FormData();
        fd.append("song", fileInput.files[0]);
        fd.append("title", title);
        fd.append("artist", document.getElementById("songArtist").value);

        try {
          const res = await fetch("http://localhost:8080/songs/upload", {
            method: "POST",
            body: fd,
          });
          const body = await res.json();
          st.textContent = res.ok
            ? `Uploaded — ID: ${body.song_id}`
            : "Upload failed. Please try again.";
          st.className = res.ok ? "ok" : "err";
        } catch {
          st.textContent = "Network error.";
          st.className = "err";
        }
      }
    </script>
  </body>
</html>
