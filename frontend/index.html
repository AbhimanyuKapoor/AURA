<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Aura</title>
  </head>
  <body>
    <h2>🎵 Aura – Song Recognition</h2>

    <!-- Recognition via microphone -->
    <h3>Recognize a Song</h3>
    <button id="start">🎙️ Start Listening</button>
    <button id="stop" disabled>⏹️ Stop</button>
    <div id="result" style="margin-top:20px; font-size:1.2em;"></div>

    <hr />

    <!-- Song ingestion via file upload -->
    <h3>Upload a Song to Database</h3>
    <input type="text"  id="songTitle"  placeholder="Song title (required)" />
    <input type="text"  id="songArtist" placeholder="Artist (optional)" />
    <br /><br />
    <input type="file"  id="songFile" accept="audio/*" />
    <button onclick="uploadSong()">⬆️ Upload Song</button>
  </body>

  <script>
    let ws, recorder, stream;
    const startBtn = document.getElementById("start");
    const stopBtn  = document.getElementById("stop");
    startBtn.onclick = start;
    stopBtn.onclick  = stop;

    async function start() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch (e) {
        alert("Microphone permission denied");
        return;
      }

      ws = new WebSocket("ws://localhost:8080/ws/audio");

      ws.onopen = () => {
        recorder = new MediaRecorder(stream);
        recorder.ondataavailable = (e) => {
          if (e.data.size > 0 && ws.readyState === WebSocket.OPEN) {
            ws.send(e.data);
          }
        };
        recorder.start(1000);
        startBtn.disabled = true;
        stopBtn.disabled  = false;
        setResult("🎙️ Listening...");
      };

      ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.error) {
          setResult("❌ Error: " + data.error);
        } else if (data.found) {
          setResult(`🎵 ${data.title} — ${data.artist}  (confidence: ${data.score})`);
        } else {
          setResult("🔍 No match found");
        }
        ws.close();
      };

      ws.onclose = () => {
        startBtn.disabled = false;
        stopBtn.disabled  = true;
      };

      ws.onerror = (e) => {
        console.error("WS error", e);
        setResult("❌ Connection error");
      };
    }

    function stop() {
      recorder?.stop();
      stream?.getTracks().forEach((t) => t.stop());
      if (ws?.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: "end" }));
        setResult("⏳ Recognizing...");
      }
    }

    async function uploadSong() {
      const fileInput = document.getElementById("songFile");
      const title     = document.getElementById("songTitle").value;
      if (!fileInput.files.length) { alert("Select a file"); return; }
      if (!title)                  { alert("Enter a title"); return; }

      const formData = new FormData();
      formData.append("song",   fileInput.files[0]);
      formData.append("title",  title);
      formData.append("artist", document.getElementById("songArtist").value);

      const res  = await fetch("http://localhost:8080/songs/upload", {
        method: "POST", body: formData,
      });
      const body = await res.json();
      alert(res.ok ? `✅ Uploaded! Song ID: ${body.song_id}` : `❌ Upload failed`);
    }

    function setResult(msg) {
      document.getElementById("result").textContent = msg;
    }
  </script>
</html>
